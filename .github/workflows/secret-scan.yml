name: Secret Scan

# Scans for committed secrets on every push and PR. Mirrors the qodeca/erfana-skills
# approach: version-pinned binary downloads (no third-party actions, no org license
# requirement). gitleaks scans full git history; trufflehog fails on verified secrets.

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.repository == 'qodeca/erfana' || github.event_name == 'pull_request'
    steps:
      # actions/checkout v6.0.3 — pinned to match the other workflows.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      - name: gitleaks (full git history)
        run: |
          set -euo pipefail
          version=8.30.1
          # SHA-256 of gitleaks_${version}_linux_x64.tar.gz from the official release
          # checksums file. Bump this hash whenever you bump the version above.
          sha256=551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${version}/gitleaks_${version}_linux_x64.tar.gz" \
            -o "$RUNNER_TEMP/gitleaks.tar.gz"
          echo "${sha256}  $RUNNER_TEMP/gitleaks.tar.gz" | sha256sum -c -
          tar -xz -C "$RUNNER_TEMP" -f "$RUNNER_TEMP/gitleaks.tar.gz" gitleaks
          "$RUNNER_TEMP/gitleaks" version
          "$RUNNER_TEMP/gitleaks" detect --source . --log-opts="--all" --redact -v
      - name: trufflehog (full git history, verified secrets)
        run: |
          set -euo pipefail
          version=3.95.5
          # SHA-256 of trufflehog_${version}_linux_amd64.tar.gz from the official release
          # checksums file. Bump this hash whenever you bump the version above.
          sha256=8d151a19465973bec226be5992a2a11b053f4ab92c77861f642089892ae9aa58
          curl -sSfL "https://github.com/trufflesecurity/trufflehog/releases/download/v${version}/trufflehog_${version}_linux_amd64.tar.gz" \
            -o "$RUNNER_TEMP/trufflehog.tar.gz"
          echo "${sha256}  $RUNNER_TEMP/trufflehog.tar.gz" | sha256sum -c -
          tar -xz -C "$RUNNER_TEMP" -f "$RUNNER_TEMP/trufflehog.tar.gz" trufflehog
          "$RUNNER_TEMP/trufflehog" --version
          "$RUNNER_TEMP/trufflehog" git "file://$PWD" --results=verified --fail --no-update
