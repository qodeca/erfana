# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"

  # Keep SHA-pinned third-party actions in .github/workflows/* and
  # .github/actions/*/action.yml fresh. Without this block, a SHA-pinned
  # action silently drifts from the latest secure release. Auto-merge of
  # patch-level updates is gated on checks.yml green per project policy.
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
